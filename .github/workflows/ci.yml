# Модель: Оптимальне керування процесом очищення водойми ( 5 семестр )
# Автор: Маляренко Анастасія, група АІ-233

name: CI/CD Pipeline for Water Optimization API

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 flask numpy scipy

    - name: Lint code with flake8 (Syntax check)
      run: |
        # Зупиняє збірку, якщо є критичні синтаксичні помилки або невизначені змінні
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Наступний рядок трактує інші попередження як підказки, не ламаючи білд
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image
      run: |
        docker build -t lab2-model:latest .
