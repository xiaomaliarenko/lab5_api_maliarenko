# Модель: Оптимальне керування процесом очищення водойми (5 семестр)
# Автор: Маляренко Анастасія, група АІ-233
# Варіант: 9 (Непарний — з етапом тестування unittest)

name: CI/CD Pipeline for Water Optimization API

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 flask numpy scipy

    - name: Lint code with flake8 (Syntax check)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # === АВТОМАТИЗОВАНЕ ТЕСТУВАННЯ ДЛЯ 9 ВАРІАНТУ ===
    - name: Run automated unit tests
      run: |
        python -m unittest app.py

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image
      run: |
        docker build -t lab2-model:latest .
